# NOTE: This file should be named prek.toml but Renovate does not support it yet.
repos:
  - repo: builtin
    hooks:
      - id: trailing-whitespace
      - id: check-added-large-files
      - id: check-case-conflict
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: check-json
      - id: check-json5
      - id: check-toml
      - id: check-yaml
        args:
          - --allow-multiple-documents
      - id: check-xml
      - id: mixed-line-ending
      - id: check-symlinks
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-executables-have-shebangs

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # frozen: v6.0.0
    hooks:
      - id: check-ast
      - id: check-shebang-scripts-are-executable
      - id: requirements-txt-fixer

  - repo: meta
    hooks:
      - id: check-useless-excludes

  - repo: https://github.com/gitleaks/gitleaks
    rev: 83d9cd684c87d95d656c1458ef04895a7f1cbd8e # frozen: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/codespell-project/codespell
    rev: 57b21406f092110c18776e39b0bda50d37c945c8 # frozen: v2.4.3
    hooks:
      - id: codespell

  - repo: https://github.com/rhysd/actionlint
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca # frozen: v1.7.12
    hooks:
      - id: actionlint

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: 745eface02aef23e168a8afb6b5737818efbea95 # frozen: v0.11.0.1
    hooks:
      - id: shellcheck

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: cb8c523fd4835aba42af70f4cad5568db4df0b6c # frozen: v0.16.0
    hooks:
      - id: ruff-check
        args:
          - --fix
      - id: ruff-format

  # NOTE: Disable uv pre-commit since we are using Python 3.6 which is not supported by uv.
  # - repo: https://github.com/astral-sh/uv-pre-commit
  #   rev: e3daa3b1abb0f966fc89f674fdf01eebd84c2eec # frozen: 0.10.12
  #   hooks:
  #     - id: uv-lock

  - repo: https://github.com/ansible/ansible-lint
    rev: 262624cd0ab22a4221293216856c59671ce7aa5e # frozen: v26.6.0
    hooks:
      - id: ansible-lint
        # NOTE: This collection requires ansible-core<2.17, so we need to specify the language version and the additional dependencies.
        language_version: python3.13
        additional_dependencies:
          - ansible-core<2.17

  - repo: https://github.com/hadolint/hadolint
    rev: 57e1618d78fd469a92c1e584e8c9313024656623 # frozen: v2.14.0
    hooks:
      - id: hadolint-docker

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: 06f92c99e930c11230426b5edd775021d25e08a8 # frozen: v0.23.1
    hooks:
      - id: markdownlint-cli2

  - repo: https://github.com/renovatebot/pre-commit-hooks
    rev: ff711085fc6dca46b76e1c698c7360d598711807 # frozen: 43.279.1
    hooks:
      - id: renovate-config-validator
        args: [--strict]
