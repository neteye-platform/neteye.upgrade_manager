name: Tests

on:
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run tests with Python 3.6
        run: |
          pip install "ansible-core<2.17"
          ansible-galaxy collection install . --collections-path .
          cd ./ansible_collections/neteye/upgrade_manager/
          ansible-test units --python 3.6 --docker
